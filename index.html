<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reality Check 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #6c5ce7; /* Party Purple */
            --secondary: #00cec9; /* Mint Blue */
            --bg-gradient: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: 'Poppins', sans-serif;
            overflow: hidden; 
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-width: 90%;
            width: 400px;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            color: #2d3436;
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .gif-container {
            height: 220px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            max-height: 100%;
            max-width: 100%;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: relative; 
            min-height: 60px;
        }

        button {
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: var(--primary);
            color: white;
            z-index: 2;
        }

        #yesBtn:hover {
            transform: scale(1.05);
            background-color: #5f27cd;
        }

        #noBtn {
            background-color: #ff7675;
            color: white;
            position: relative; 
            z-index: 1;
        }

        /* Shake animation */
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .success-text {
            color: #2d3436;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 20px;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card" id="card">
        <h1 id="question">Are you officially ancient today? 🎂</h1>
        
        <div class="gif-container">
            <img id="gif" src="https://media.giphy.com/media/ANbD1CCdA3iI8/giphy.gif" alt="Suspicious">
        </div>

        <div class="buttons" id="buttonContainer">
            <button id="yesBtn">Fine, I'm old 🧓</button>
            <button id="noBtn">No, I'm forever 21! 🛑</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const gif = document.getElementById('gif');
        const question = document.getElementById('question');
        const card = document.getElementById('card');

        let noClickCount = 0;
        let isEvading = false;

        // The roast messages!
        const roastTrips = [
            "No, I'm forever 21! 🛑",
            "Denial is cute. 🙄",
            "Your back literally hurts right now. 🦴",
            "Did you take your vitamins today? 💊",
            "You used to have a MySpace. Stop lying. 💻",
            "I can hear your knees clicking from here 🔊",
            "Just accept it, grandpa/grandma! 🏃💨"
        ];

        // Funny GIFs as they keep denying their age
        const teaseGifs = [
            "https://media.giphy.com/media/1Qdp4trljSkY8/giphy.gif", // Laughing
            "https://media.giphy.com/media/l0IyajjbNiRvCr7RC/giphy.gif", // Grandma
            "https://media.giphy.com/media/jp313yHGzTDBbw5Tg6/giphy.gif"  // Laughing pointing
        ];

        function evadeCursor() {
            if (!isEvading) return;
            
            noBtn.style.position = 'fixed';
            
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Handle the NO button logic
        function handleNoClick(e) {
            e.preventDefault(); 
            noClickCount++;

            // Shake the card
            card.classList.remove('shake');
            void card.offsetWidth; 
            card.classList.add('shake');

            // Change text to roast them
            if (noClickCount < roastTrips.length) {
                noBtn.innerText = roastTrips[noClickCount];
            }

            // Cycle through tease GIFs
            if (noClickCount === 2) gif.src = teaseGifs[0];
            if (noClickCount === 4) gif.src = teaseGifs[1];

            // Make YES button bigger
            const currentScale = 1 + (noClickCount * 0.15);
            yesBtn.style.transform = `scale(${currentScale})`;

            // Activate "Evasion Mode" after 5 tries
            if (noClickCount >= 5) {
                isEvading = true;
                gif.src = teaseGifs[2];
                noBtn.innerText = "Can't catch youth! 🏃💨";
                evadeCursor();
            }
        }

        noBtn.addEventListener('click', handleNoClick);
        noBtn.addEventListener('mouseover', () => {
            if (isEvading) evadeCursor();
        });
        noBtn.addEventListener('touchstart', (e) => {
            if (isEvading) {
                e.preventDefault();
                evadeCursor();
            }
        }, {passive: false});


        // Handle the YES button logic (The real birthday wish!)
        yesBtn.addEventListener('click', () => {
            
            // Massive Multi-colored Confetti explosion
            var duration = 4 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 8,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#6c5ce7', '#00cec9', '#fd79a8', '#ffeaa7', '#00b894']
                });
                confetti({
                    particleCount: 8,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#6c5ce7', '#00cec9', '#fd79a8', '#ffeaa7', '#00b894']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // Update UI to the sweet Birthday Wish
            card.innerHTML = `
                <h1 style="color: #6c5ce7; font-size: 2.5rem;">HAPPY BIRTHDAY! 🎉</h1>
                <div class="gif-container" style="height: 250px;">
                    <img src="https://media.giphy.com/media/LZwCGX8fPTscI/giphy.gif" alt="Party!">
                </div>
                <div class="success-text">
                    Just kidding! You're aging like fine wine. 🍷<br><br>
                    Hope you have the absolute best day ever! Let's celebrate! 🥳🎁
                </div>
            `;
            
            // Change background to a festive yellow/orange vibe
            document.body.style.background = "linear-gradient(135deg, #f6d365 0%, #fda085 100%)";
            document.body.style.animation = "none";
        });
    </script>
</body>
</html>
