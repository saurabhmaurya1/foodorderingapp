<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will you be my Valentine? ❤️</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: 'Poppins', sans-serif;
        overflow: hidden;
    }

    .card {
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    h1 {
        color: #fff;
        font-size: 2rem;
        margin-bottom: 20px;
    }

    img {
        width: 200px;
        border-radius: 15px;
        margin-bottom: 20px;
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    button {
        padding: 12px 25px;
        font-size: 1.1rem;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    #yesBtn {
        background: #00c853;
        color: white;
    }

    #noBtn {
        background: #ff1744;
        color: white;
    }

    button:hover {
        transform: scale(1.1);
    }
</style>
</head>

<body>

<div class="card" id="card">
    <h1 id="question">Will you be my Valentine? ❤️</h1>

    <img id="gif" src="https://media.giphy.com/media/cLS1cfxvGOPVpf9g3y/giphy.gif">

    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>
    </div>
</div>

<script>
let noCount = 0;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const gif = document.getElementById("gif");
const card = document.getElementById("card");

const messages = [
    "No 😢",
    "Are you sure? 🥺",
    "Please... 💔",
    "Don’t do this 😭",
    "I’ll be sad 😞",
    "Last chance 😤",
    "Say Yes!!! 😡"
];

noBtn.addEventListener("click", () => {
    noCount++;

    // Grow YES button
    yesBtn.style.transform = `scale(${1 + noCount * 0.3})`;

    // Change NO text
    noBtn.innerText = messages[Math.min(noCount, messages.length - 1)];

    // Change GIF
    if (noCount === 3) {
        gif.src = "https://media.giphy.com/media/OPU6wUKARA8AU/giphy.gif";
    }
});

yesBtn.addEventListener("click", () => {
    card.innerHTML = `
        <h1>YAYYY!!! 🎉❤️</h1>
        <img src="https://media.giphy.com/media/l41lTxfonv65SUp5S/giphy.gif">
        <p style="color:white; font-size:18px;">
            You made me the happiest person 🥰
        </p>
    `;

    document.body.style.background = "#ff4b5c";
});
</script>

</body>
</html>
