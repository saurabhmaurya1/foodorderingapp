<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be my Valentine?</title>
    <style>
        /* CSS: Styling the vibe */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fce4ec; /* Light pink background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #d81b60;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .gif-container {
            height: 250px;
            margin-bottom: 20px;
        }

        img {
            max-height: 100%;
            border-radius: 15px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 10px 25px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        #yesBtn {
            background-color: #4caf50;
            color: white;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
        }

        /* Success message styling */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1 id="question">Will you be my Valentine? ❤️</h1>
        
        <div class="gif-container">
            <img id="displayGif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXF5amFvN3F5amFvN3F5amFvN3F5amFvN3F5amFvN3F5JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute GIF">
        </div>

        <div class="buttons" id="btnGroup">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const mainContainer = document.getElementById('mainContainer');
        const displayGif = document.getElementById('displayGif');

        let noCount = 0;
        const messages = [
            "No",
            "Are you sure? 🥺",
            "Pookie please... 🎀",
            "Don't do this to me!",
            "I'm gonna cry... 😭",
            "You're breaking my heart",
            "Last chance! 😤"
        ];

        // Logic for the 'No' button
        noBtn.addEventListener('click', () => {
            noCount++;
            
            // 1. Make Yes button bigger
            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentSize * 1.4) + "px";
            yesBtn.style.padding = (noCount * 10 + 10) + "px " + (noCount * 20 + 25) + "px";

            // 2. Change the No button text
            if (noCount < messages.length) {
                noBtn.innerText = messages[noCount];
            } else {
                noBtn.innerText = "Just say Yes! 😡";
            }

            // 3. Optional: Change GIF to a sadder one as they keep saying no
            if(noCount === 3) {
                displayGif.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXF5amFvN3F5amFvN3F5amFvN3F5amFvN3F5JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/OPU6wUKARA8AU/giphy.gif";
            }
        });

        // Logic for the 'Yes' button
        yesBtn.addEventListener('click', () => {
            mainContainer.innerHTML = `
                <h1 style="color: #d81b60;">Knew you would say yes! 🎉</h1>
                <div class="gif-container">
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXF5amFvN3F5amFvN3F5amFvN3F5amFvN3F5JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/l41lTxfonv65SUp5S/giphy.gif">
                </div>
                <p style="font-size: 1.2rem; color: #ad1457;">You just made me the happiest person!</p>
            `;
            
            // Add some confetti effect (optional)
            document.body.style.backgroundColor = "#ffc1e3";
        });
    </script>
</body>
</html>
